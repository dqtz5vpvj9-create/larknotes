<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LarkNotes</title>
    <style>
      /* DM Sans — local variable font (no CDN dependency) */
      @font-face {
        font-family: 'DM Sans';
        font-style: normal;
        font-weight: 300 700;
        font-display: swap;
        src: url('/src/assets/fonts/dm-sans-normal-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'DM Sans';
        font-style: normal;
        font-weight: 300 700;
        font-display: swap;
        src: url('/src/assets/fonts/dm-sans-normal-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: 'DM Sans';
        font-style: italic;
        font-weight: 300 700;
        font-display: swap;
        src: url('/src/assets/fonts/dm-sans-italic-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'DM Sans';
        font-style: italic;
        font-weight: 300 700;
        font-display: swap;
        src: url('/src/assets/fonts/dm-sans-italic-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      :root {
        --c-bg: #1a1a1e;
        --c-bg-elevated: #222226;
        --c-bg-hover: #2a2a2f;
        --c-bg-active: #323238;
        --c-surface: #faf9f7;
        --c-surface-hover: #f3f1ee;
        --c-border: rgba(255,255,255,0.06);
        --c-border-light: rgba(0,0,0,0.06);
        --c-text: #e8e6e3;
        --c-text-secondary: #8a8880;
        --c-text-tertiary: #5c5a55;
        --c-text-dark: #2c2a26;
        --c-text-dark-secondary: #7a7770;
        --c-accent: #d4a547;
        --c-accent-hover: #e0b45a;
        --c-green: #5cb88a;
        --c-blue: #5b9fd4;
        --c-amber: #d4a547;
        --c-red: #d45b5b;
        --c-yellow: #d4c247;
        --font-sans: "DM Sans", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Cascadia Code", Consolas, monospace;
        --radius-sm: 4px;
        --radius: 6px;
        --radius-lg: 10px;
        --radius-pill: 100px;
        --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        /* Derived accent colors for consistent theming */
        --c-accent-bg: rgba(212,165,71,0.1);
        --c-accent-bg-strong: rgba(212,165,71,0.25);
        --c-accent-border: rgba(212,165,71,0.3);
        --c-red-bg: rgba(212,91,91,0.1);
        --c-red-border: rgba(212,91,91,0.2);
        --c-blue-bg: rgba(91,159,212,0.1);
        --c-amber-bg: rgba(212,194,71,0.1);
      }
      /* Light theme */
      [data-theme="light"] {
        --c-bg: #f8f7f5;
        --c-bg-elevated: #ffffff;
        --c-bg-hover: #f0eeeb;
        --c-bg-active: #e8e6e2;
        --c-border: rgba(0,0,0,0.08);
        --c-text: #1c1b19;
        --c-text-secondary: #6b6960;
        --c-text-tertiary: #9c9a94;
        --c-accent: #c49230;
        --c-accent-hover: #b3841f;
        --c-green: #2d9660;
        --c-blue: #3580b8;
        --c-amber: #c49230;
        --c-red: #c44040;
        --c-yellow: #b8a020;
        --c-accent-bg: rgba(196,146,48,0.1);
        --c-accent-bg-strong: rgba(196,146,48,0.25);
        --c-accent-border: rgba(196,146,48,0.3);
        --c-red-bg: rgba(196,64,64,0.1);
        --c-red-border: rgba(196,64,64,0.2);
        --c-blue-bg: rgba(53,128,184,0.1);
        --c-amber-bg: rgba(196,146,48,0.1);
      }
      [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
      [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        overflow: hidden;
        font-family: var(--font-sans);
        background: var(--c-bg);
        color: var(--c-text);
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
      ::selection { background: var(--c-accent-border); }
      input::placeholder { color: var(--c-text-tertiary); }
      :focus-visible { outline: 2px solid var(--c-accent-border); outline-offset: 1px; border-radius: var(--radius); }
      button:focus-visible, [role="button"]:focus-visible { outline: 2px solid var(--c-accent-border); outline-offset: 1px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
